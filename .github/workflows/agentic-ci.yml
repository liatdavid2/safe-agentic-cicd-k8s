name: Agentic CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  agentic-ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      MINIGPT_API_KEY: ${{ secrets.MINIGPT_API_KEY }}
      MINIGPT_CHAT_URL: ${{ secrets.MINIGPT_CHAT_URL }}
      MINIGPT_MODELS_URL: ${{ secrets.MINIGPT_MODELS_URL }}
      MINIGPT_MODEL: ${{ secrets.MINIGPT_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orders-api/requirements.txt
          pip install -r agents/requirements.txt

      - name: Create CI input files
        run: |
          mkdir -p .ci
          mkdir -p reports

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff "${{ github.event.pull_request.base.sha }}"...HEAD > .ci/changed.diff || true
          else
            git diff "${{ github.event.before }}" "${{ github.sha }}" > .ci/changed.diff || git show --format= --patch "${{ github.sha }}" > .ci/changed.diff || true
          fi

          if [ ! -s .ci/changed.diff ]; then
            echo "No code diff found." > .ci/changed.diff
          fi

      - name: Run API tests
        run: |
          set -o pipefail

          if find services/orders-api -name "test_*.py" | grep -q .; then
            pytest services/orders-api | tee reports/tests.txt
          else
            echo "No tests found under services/orders-api" | tee reports/tests.txt
          fi

      - name: Run PR Review Agent
        if: always()
        continue-on-error: true
        run: |
          python -m agents.agent_runner \
            --mode pr_review \
            --diff-file .ci/changed.diff \
            --out reports/pr_review.md

      - name: Run Security Scan Agent
        if: always()
        continue-on-error: true
        run: |
          python -m agents.agent_runner \
            --mode security_scan \
            --diff-file .ci/changed.diff \
            --out reports/security_scan.md

      - name: Create evidence file
        if: always()
        run: |
          {
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run ID: ${{ github.run_id }}"
            echo ""
            echo "Test output:"
            cat reports/tests.txt || true
          } > .ci/evidence.txt

      - name: Run Issue Agent
        if: always()
        continue-on-error: true
        run: |
          python -m agents.agent_runner \
            --mode issue \
            --evidence-file .ci/evidence.txt \
            --out reports/issue.md

      - name: Upload agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ci-reports
          path: reports/

      - name: Comment reports on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            function readFile(path) {
              if (!fs.existsSync(path)) {
                return "Report was not generated.";
              }
              const text = fs.readFileSync(path, "utf8");
              return text.length > 5000 ? text.slice(0, 5000) + "\n\n...truncated..." : text;
            }

            const prReview = readFile("reports/pr_review.md");
            const securityScan = readFile("reports/security_scan.md");
            const issueReport = readFile("reports/issue.md");

            const body = `
            ## Agentic CI Report

            ### PR Review Agent

            \`\`\`text
            ${prReview}
            \`\`\`

            ### Security Scan Agent

            \`\`\`text
            ${securityScan}
            \`\`\`

            ### Issue Agent

            \`\`\`text
            ${issueReport}
            \`\`\`
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });