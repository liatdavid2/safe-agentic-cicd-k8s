name: PR Agent Review

on:
  pull_request:
    branches: [main]

jobs:
  pr-agent:
    runs-on: ubuntu-latest

    outputs:
      security_risk: ${{ steps.security_gate.outputs.security_risk }}

    env:
      MINIGPT_API_KEY: ${{ secrets.MINIGPT_API_KEY }}
      MINIGPT_MODEL: ${{ secrets.MINIGPT_MODEL }}
      MINIGPT_CHAT_URL: ${{ secrets.MINIGPT_CHAT_URL || 'https://api.openai.com/v1/chat/completions' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orders-api/requirements.txt
          pip install -r agents/requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/services/orders-api
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          mkdir -p artifacts
          python -c "from app.main import app; print('app import ok')"
          python -m pytest services/orders-api/tests | tee artifacts/tests.txt

      - name: Prepare artifacts
        if: always()
        run: mkdir -p artifacts

      - name: Capture PR diff
        if: always()
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > artifacts/pr_diff.diff

          if [ ! -s artifacts/pr_diff.diff ]; then
            echo "No PR diff found." > artifacts/pr_diff.diff
          fi

      - name: Run LLM security agent
        if: always()
        run: |
          python -m agents.agent_runner \
            --mode security_scan \
            --diff-file artifacts/pr_diff.diff \
            --out artifacts/security_report.md

      - name: Run LLM PR review agent
        if: always()
        run: |
          python -m agents.agent_runner \
            --mode pr_review \
            --diff-file artifacts/pr_diff.diff \
            --out artifacts/pr_review_report.md

      - name: Show security review before approval
        if: always()
        run: |
          echo "## Security Review Before Approval" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Security Scan Agent" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f artifacts/security_report.md ]; then
            cat artifacts/security_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Security report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### PR Review Agent" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f artifacts/pr_review_report.md ]; then
            cat artifacts/pr_review_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PR review report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Evaluate security risk
        id: security_gate
        if: always()
        shell: bash
        run: |
          SECURITY_RISK=false

          if [ -f artifacts/security_report.md ]; then
            if grep -Eiq "Risk level: High|Severity: High" artifacts/security_report.md; then
              SECURITY_RISK=true
            fi
          fi

          echo "security_risk=$SECURITY_RISK" >> "$GITHUB_OUTPUT"

          if [ "$SECURITY_RISK" = "true" ]; then
            echo "High security risk detected. Human approval is required."
          else
            echo "No high security risk detected."
          fi

      - name: Upload agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-pr-reports
          path: artifacts/*.md