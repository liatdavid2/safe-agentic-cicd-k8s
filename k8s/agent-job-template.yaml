apiVersion: batch/v1
kind: Job
metadata:
  name: devops-agent-rca
  namespace: agentic-devops
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: devops-agent-runner
      restartPolicy: Never
      containers:
        - name: devops-agent-runner
          image: devops-agent-runner:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e

              python -m agents.agent_runner \
                --mode rca \
                --evidence-file /tmp/deployment_evidence.txt \
                --out /tmp/rca_from_job.md

              echo ""
              echo "===== RCA REPORT ====="
              cat /tmp/rca_from_job.md
          envFrom:
            - secretRef:
                name: minigpt-secret
          volumeMounts:
            - name: deployment-evidence
              mountPath: /tmp/deployment_evidence.txt
              subPath: deployment_evidence.txt
      volumes:
        - name: deployment-evidence
          configMap:
            name: deployment-evidence